name: Build & deploy reader to VPS

on:
  push:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: deploy-reader
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install deps
        run: yarn install

      - name: Build
        run: yarn build
        env:
          VITE_GA_ID: ${{ vars.VITE_GA_ID }}
          VITE_REQUIRE_TOKEN: ${{ vars.VITE_REQUIRE_TOKEN }}

      - name: Deploy via rsync over SSH
        uses: burnett01/rsync-deployments@v9
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: ${{ secrets.VPS_READER_PATH }}
          remote_host: ${{ secrets.VPS_HOST }}
          remote_port: ${{ secrets.VPS_PORT }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
